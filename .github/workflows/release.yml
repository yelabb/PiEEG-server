name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write  # for GitHub Releases

jobs:
  # ── Publish to PyPI ──
  pypi:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # trusted publishing (no API token needed)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ── Build standalone binary for Raspberry Pi (aarch64) ──
  binary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU for aarch64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build aarch64 binary in container
        run: |
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            python:3.12-bookworm \
            bash -c '
              pip install --upgrade pip
              pip install pyinstaller
              pip install .
              pyinstaller \
                --onefile \
                --name pieeg-server \
                --hidden-import pieeg_server.server \
                --hidden-import pieeg_server.acquisition \
                --hidden-import pieeg_server.dashboard \
                --hidden-import pieeg_server.filters \
                --hidden-import pieeg_server.mock \
                --hidden-import pieeg_server.hardware \
                --hidden-import pieeg_server.doctor \
                --add-data "pieeg_server/static:pieeg_server/static" \
                pieeg_server/__main__.py
            '

      - name: Rename binary with version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          mv dist/pieeg-server dist/pieeg-server-${VERSION}-linux-arm64

      - name: Upload binary to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/pieeg-server-*-linux-arm64
          generate_release_notes: true
