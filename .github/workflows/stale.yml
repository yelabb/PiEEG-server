name: Stale issues & PRs

on:
  schedule:
    - cron: "0 10 * * 1"  # Monday 10:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has had no activity for 90 days. It will be closed in
            14 days unless there is new activity. Feel free to reopen if still relevant.
          stale-pr-message: >
            This PR has had no activity for 60 days. It will be closed in
            14 days unless updated.
          close-issue-message: "Closed due to inactivity. Reopen anytime if needed."
          close-pr-message: "Closed due to inactivity. Reopen anytime if needed."
          days-before-stale: 90
          days-before-close: 14
          days-before-pr-stale: 60
          days-before-pr-close: 14
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "pinned,security,bug"
          exempt-pr-labels: "pinned,security"
