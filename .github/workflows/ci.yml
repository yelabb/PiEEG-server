name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Unit / integration tests (fast, every push) ──
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v

  # ── Dashboard build check ──
  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci
      - run: npm run build

  # ── Debian container smoke test (mimics Pi OS) ──
  install-and-smoke-test:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm  # same base as Raspberry Pi OS

    steps:
      - name: Install checkout prerequisites
        run: |
          apt-get update -qq
          apt-get install -y -qq git ca-certificates

      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get install -y -qq python3 python3-pip python3-venv

      - name: Create venv and install package
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -e .

      - name: Verify entry point exists
        run: |
          . .venv/bin/activate
          pieeg-server --help

      - name: Import all modules
        run: |
          . .venv/bin/activate
          python -c "
          from pieeg_server.server import PiEEGServer
          from pieeg_server.acquisition import AcquisitionLoop
          from pieeg_server.dashboard import DashboardServer
          from pieeg_server.filters import BandpassFilter
          from pieeg_server.mock import MockHardware
          from pieeg_server.hardware import PiEEGHardware
          from pieeg_server.doctor import run_doctor
          print('All modules imported OK')
          "

      - name: Run doctor
        run: |
          . .venv/bin/activate
          pieeg-server doctor || true  # warnings expected in CI (no SPI/GPIO)

      - name: Smoke test (mock mode, 3 seconds)
        run: |
          . .venv/bin/activate
          timeout 5 pieeg-server --mock --no-dashboard -v || EXIT_CODE=$?
          # timeout returns 124 on timeout (expected), anything else is a real failure
          if [ "${EXIT_CODE:-124}" -eq 124 ]; then
            echo "Mock server ran successfully for 3+ seconds"
          else
            echo "Server exited with code $EXIT_CODE"
            exit $EXIT_CODE
          fi

      - name: Verify no gpiod dependency
        run: |
          . .venv/bin/activate
          python -c "
          import importlib.util
          spec = importlib.util.find_spec('gpiod')
          assert spec is None, 'gpiod should NOT be installed'
          print('Confirmed: gpiod is not installed')
          "
