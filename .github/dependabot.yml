version: 2

updates:
  # Python (pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels: ["dependencies"]
    open-pull-requests-limit: 5

  # Dashboard (npm)
  - package-ecosystem: "npm"
    directory: "/dashboard"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(dashboard)"
    labels: ["dependencies", "dashboard"]
    open-pull-requests-limit: 5

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "ci"
    labels: ["ci"]
