<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PiEEG-16 Dashboard</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    overflow-x: hidden;
  }

  /* --- Header --- */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .header h1 {
    font-size: 18px;
    font-weight: 600;
  }
  .header h1 span { color: var(--accent); }
  .status-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    display: inline-block;
    margin-right: 4px;
  }
  .status-dot.connected { background: var(--green); }

  /* --- Controls --- */
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .btn {
    background: var(--border);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: background 0.15s;
  }
  .btn:hover { background: #484f58; }
  .btn.active { background: var(--accent); border-color: var(--accent); color: #000; }
  .control-group {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .control-group input {
    width: 50px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 3px 6px;
    border-radius: 4px;
    font-size: 12px;
    text-align: center;
  }
  .control-group select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 3px 6px;
    border-radius: 4px;
    font-size: 12px;
  }
  .sep {
    width: 1px; height: 20px;
    background: var(--border);
  }

  /* --- Canvas grid --- */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    padding: 1px;
  }
  .channel-cell {
    background: var(--bg);
    position: relative;
  }
  .channel-cell .label {
    position: absolute;
    top: 4px; left: 8px;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    z-index: 1;
    pointer-events: none;
  }
  .channel-cell canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* --- Footer --- */
  .footer {
    padding: 6px 20px;
    font-size: 11px;
    color: var(--text-dim);
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Pi<span>EEG</span>-16 <small style="font-weight:400;color:var(--text-dim)">Dashboard</small></h1>
  <div class="status-bar">
    <span><span class="status-dot" id="statusDot"></span> <span id="statusText">Disconnected</span></span>
    <span id="sampleRate">— Hz</span>
    <span id="sampleCount">0 samples</span>
  </div>
</div>

<div class="controls">
  <button class="btn" id="btnPause">⏸ Pause</button>
  <button class="btn" id="btnFilter">Filter: OFF</button>
  <div class="sep"></div>
  <div class="control-group">
    <label>Low</label>
    <input type="number" id="lowcut" value="1" min="0.1" max="50" step="0.5"> Hz
  </div>
  <div class="control-group">
    <label>High</label>
    <input type="number" id="highcut" value="40" min="1" max="125" step="1"> Hz
  </div>
  <div class="sep"></div>
  <div class="control-group">
    <label>Time window</label>
    <select id="timeWindow">
      <option value="2">2s</option>
      <option value="4" selected>4s</option>
      <option value="8">8s</option>
      <option value="16">16s</option>
    </select>
  </div>
  <div class="control-group">
    <label>Scale</label>
    <select id="yScale">
      <option value="50">±50 µV</option>
      <option value="100" selected>±100 µV</option>
      <option value="200">±200 µV</option>
      <option value="500">±500 µV</option>
      <option value="auto">Auto</option>
    </select>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="footer">
  <span>PiEEG-16-Server &middot; WebSocket <span id="wsUrl">—</span></span>
  <span>Battery powered only &middot; Not a medical device</span>
</div>

<script>
(function() {
  "use strict";

  // --- Config ---
  const NUM_CHANNELS = 16;
  const SAMPLE_RATE = 250;
  const TRACE_COLORS = [
    "#58a6ff","#3fb950","#d29922","#f85149",
    "#bc8cff","#39d2c0","#f0883e","#db61a2",
    "#58a6ff","#3fb950","#d29922","#f85149",
    "#bc8cff","#39d2c0","#f0883e","#db61a2"
  ];
  const GRID_COLOR = "rgba(48,54,61,0.4)";
  const ZERO_LINE_COLOR = "rgba(88,166,255,0.15)";

  // --- State ---
  let paused = false;
  let filterEnabled = false;
  let ws = null;
  let connected = false;
  let totalSamples = 0;
  let recentTimestamps = [];

  // Per-channel ring buffers
  let timeWindowSec = 4;
  let bufferSize = SAMPLE_RATE * timeWindowSec;
  const channelBuffers = [];
  for (let i = 0; i < NUM_CHANNELS; i++) {
    channelBuffers.push(new Float32Array(bufferSize));
  }
  let writeIndex = 0;
  let samplesInBuffer = 0;

  // --- DOM refs ---
  const grid = document.getElementById("grid");
  const statusDot = document.getElementById("statusDot");
  const statusText = document.getElementById("statusText");
  const sampleRateEl = document.getElementById("sampleRate");
  const sampleCountEl = document.getElementById("sampleCount");
  const wsUrlEl = document.getElementById("wsUrl");
  const btnPause = document.getElementById("btnPause");
  const btnFilter = document.getElementById("btnFilter");
  const lowcutInput = document.getElementById("lowcut");
  const highcutInput = document.getElementById("highcut");
  const timeWindowSelect = document.getElementById("timeWindow");
  const yScaleSelect = document.getElementById("yScale");

  // --- Build channel grid ---
  const canvases = [];
  const contexts = [];
  for (let i = 0; i < NUM_CHANNELS; i++) {
    const cell = document.createElement("div");
    cell.className = "channel-cell";

    const label = document.createElement("div");
    label.className = "label";
    label.textContent = "Ch " + (i + 1);
    cell.appendChild(label);

    const canvas = document.createElement("canvas");
    cell.appendChild(canvas);
    grid.appendChild(cell);

    canvases.push(canvas);
    contexts.push(canvas.getContext("2d"));
  }

  // --- Resize canvases ---
  function resizeCanvases() {
    const cellWidth = Math.floor(window.innerWidth / 4);
    const headerHeight = document.querySelector(".header").offsetHeight +
                         document.querySelector(".controls").offsetHeight +
                         document.querySelector(".footer").offsetHeight + 2;
    const cellHeight = Math.floor((window.innerHeight - headerHeight) / 4);

    for (let i = 0; i < NUM_CHANNELS; i++) {
      const dpr = window.devicePixelRatio || 1;
      canvases[i].width = cellWidth * dpr;
      canvases[i].height = cellHeight * dpr;
      canvases[i].style.width = cellWidth + "px";
      canvases[i].style.height = cellHeight + "px";
      contexts[i].setTransform(dpr, 0, 0, dpr, 0, 0);
    }
  }
  window.addEventListener("resize", resizeCanvases);
  resizeCanvases();

  // --- Reset buffers when time window changes ---
  function resetBuffers() {
    bufferSize = SAMPLE_RATE * timeWindowSec;
    for (let i = 0; i < NUM_CHANNELS; i++) {
      channelBuffers[i] = new Float32Array(bufferSize);
    }
    writeIndex = 0;
    samplesInBuffer = 0;
  }

  // --- Draw one channel ---
  function drawChannel(chIdx) {
    const ctx = contexts[chIdx];
    const w = canvases[chIdx].width / (window.devicePixelRatio || 1);
    const h = canvases[chIdx].height / (window.devicePixelRatio || 1);
    const buf = channelBuffers[chIdx];

    ctx.clearRect(0, 0, w, h);

    // Grid lines (horizontal)
    ctx.strokeStyle = GRID_COLOR;
    ctx.lineWidth = 0.5;
    for (let y = 0; y < h; y += h / 4) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(w, y);
      ctx.stroke();
    }

    // Zero line
    ctx.strokeStyle = ZERO_LINE_COLOR;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, h / 2);
    ctx.lineTo(w, h / 2);
    ctx.stroke();

    if (samplesInBuffer < 2) return;

    // Y scale
    const scaleSetting = yScaleSelect.value;
    let yRange;
    if (scaleSetting === "auto") {
      let maxVal = 0;
      for (let i = 0; i < samplesInBuffer; i++) {
        const idx = (writeIndex - samplesInBuffer + i + bufferSize) % bufferSize;
        const v = Math.abs(buf[idx]);
        if (v > maxVal) maxVal = v;
      }
      yRange = Math.max(maxVal * 1.2, 10);
    } else {
      yRange = parseFloat(scaleSetting);
    }

    // Draw trace
    ctx.strokeStyle = TRACE_COLORS[chIdx];
    ctx.lineWidth = 1.2;
    ctx.beginPath();

    const count = samplesInBuffer;
    for (let i = 0; i < count; i++) {
      const idx = (writeIndex - count + i + bufferSize) % bufferSize;
      const x = (i / (bufferSize - 1)) * w;
      const y = h / 2 - (buf[idx] / yRange) * (h / 2);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  // --- Animation loop ---
  let frameRequested = false;
  function requestDraw() {
    if (frameRequested) return;
    frameRequested = true;
    requestAnimationFrame(function() {
      frameRequested = false;
      for (let i = 0; i < NUM_CHANNELS; i++) drawChannel(i);
    });
  }

  // --- Compute displayed sample rate ---
  function updateSampleRate(timestamp) {
    recentTimestamps.push(timestamp);
    const cutoff = timestamp - 2;  // 2 second window
    while (recentTimestamps.length > 0 && recentTimestamps[0] < cutoff) {
      recentTimestamps.shift();
    }
    if (recentTimestamps.length > 1) {
      const elapsed = recentTimestamps[recentTimestamps.length - 1] - recentTimestamps[0];
      if (elapsed > 0) {
        const hz = Math.round((recentTimestamps.length - 1) / elapsed);
        sampleRateEl.textContent = hz + " Hz";
      }
    }
  }

  // --- WebSocket ---
  function connectWS() {
    const wsHost = location.hostname || "localhost";
    const wsPort = parseInt(location.port || "1617") - 1;  // dashboard=1617, ws=1616
    const url = "ws://" + wsHost + ":" + wsPort;
    wsUrlEl.textContent = url;

    ws = new WebSocket(url);

    ws.onopen = function() {
      connected = true;
      statusDot.classList.add("connected");
      statusText.textContent = "Connected";
    };

    ws.onclose = function() {
      connected = false;
      statusDot.classList.remove("connected");
      statusText.textContent = "Disconnected";
      setTimeout(connectWS, 2000);
    };

    ws.onerror = function() {
      ws.close();
    };

    ws.onmessage = function(event) {
      const msg = JSON.parse(event.data);

      // Skip welcome/status messages
      if (msg.status) return;

      if (paused) return;

      const channels = msg.channels;
      if (!channels || channels.length !== NUM_CHANNELS) return;

      // Write into ring buffers
      for (let ch = 0; ch < NUM_CHANNELS; ch++) {
        channelBuffers[ch][writeIndex] = channels[ch];
      }
      writeIndex = (writeIndex + 1) % bufferSize;
      if (samplesInBuffer < bufferSize) samplesInBuffer++;

      totalSamples++;
      sampleCountEl.textContent = totalSamples.toLocaleString() + " samples";
      updateSampleRate(msg.t);
      requestDraw();
    };
  }

  // --- Controls ---
  btnPause.addEventListener("click", function() {
    paused = !paused;
    btnPause.textContent = paused ? "▶ Resume" : "⏸ Pause";
    btnPause.classList.toggle("active", paused);
  });

  btnFilter.addEventListener("click", function() {
    filterEnabled = !filterEnabled;
    btnFilter.textContent = "Filter: " + (filterEnabled ? "ON" : "OFF");
    btnFilter.classList.toggle("active", filterEnabled);
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({
        cmd: "set_filter",
        enabled: filterEnabled,
        lowcut: parseFloat(lowcutInput.value) || 1,
        highcut: parseFloat(highcutInput.value) || 40
      }));
    }
  });

  lowcutInput.addEventListener("change", function() {
    if (filterEnabled && ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({
        cmd: "set_filter",
        enabled: true,
        lowcut: parseFloat(lowcutInput.value) || 1,
        highcut: parseFloat(highcutInput.value) || 40
      }));
    }
  });

  highcutInput.addEventListener("change", function() {
    if (filterEnabled && ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({
        cmd: "set_filter",
        enabled: true,
        lowcut: parseFloat(lowcutInput.value) || 1,
        highcut: parseFloat(highcutInput.value) || 40
      }));
    }
  });

  timeWindowSelect.addEventListener("change", function() {
    timeWindowSec = parseInt(timeWindowSelect.value);
    resetBuffers();
  });

  // --- Go ---
  connectWS();
})();
</script>
</body>
</html>
